<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrackR — GPS Monitor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0f11;
  --surface: #13161a;
  --surface2: #1a1e23;
  --border: #222830;
  --border2: #2a3040;
  --text: #e8eaed;
  --muted: #6b7280;
  --dim: #3d4450;
  --accent: #00d4ff;
  --accent-dim: rgba(0,212,255,0.08);
  --accent-glow: rgba(0,212,255,0.15);
  --green: #00e676;
  --green-dim: rgba(0,230,118,0.1);
  --orange: #ff9500;
  --red: #ff3b30;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}

html, body {
  height: 100%;
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── LAYOUT ── */
.app {
  display: grid;
  grid-template-columns: 380px 1fr;
  grid-template-rows: 56px 1fr;
  height: 100vh;
}

/* ── TOPBAR ── */
.topbar {
  grid-column: 1 / -1;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 32px;
}
.topbar-logo {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
}
.topbar-divider { width: 1px; height: 20px; background: var(--border2); }
.topbar-meta {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.5px;
}
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 20px; }
.status-pill {
  display: flex; align-items: center; gap: 7px;
  border: 1px solid rgba(0,230,118,0.3);
  border-radius: 4px;
  padding: 4px 10px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--green);
  letter-spacing: 0.5px;
  background: var(--green-dim);
}
.pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }

.device-id {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1px;
}

/* ── SIDEBAR ── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.sidebar-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.3px;
}

.log-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
.log-list::-webkit-scrollbar { width: 4px; }
.log-list::-webkit-scrollbar-track { background: transparent; }
.log-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.log-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 24px;
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: all 0.12s;
  position: relative;
}
.log-item:hover { background: var(--surface2); }
.log-item.active {
  background: var(--accent-dim);
  border-left-color: var(--accent);
}
.log-item::after {
  content: '';
  position: absolute;
  bottom: 0; left: 24px; right: 24px;
  height: 1px;
  background: var(--border);
}
.log-item:last-child::after { display: none; }

.log-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 14px;
}
.log-icon.night { background: rgba(94,53,177,.2); }
.log-icon.stop  { background: rgba(0,212,255,.1); }
.log-icon.move  { background: rgba(255,149,0,.15); }

.log-info { flex: 1; min-width: 0; }
.log-coords {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: 0.3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.log-item.active .log-coords { color: var(--accent); }
.log-meta {
  font-size: 11px;
  color: var(--muted);
  margin-top: 3px;
  font-family: var(--mono);
}
.log-dur {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--dim);
  flex-shrink: 0;
}

/* ── MAIN ── */
.main {
  display: grid;
  grid-template-rows: auto 1fr auto;
  overflow: hidden;
  background: var(--bg);
}

/* coord header */
.coord-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 28px;
  display: flex;
  align-items: center;
  gap: 48px;
}
.coord-block {}
.coord-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.coord-value {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 500;
  color: var(--accent);
  letter-spacing: 1px;
}
.coord-divider { width: 1px; height: 40px; background: var(--border2); }
.meta-block { display: flex; gap: 32px; }
.meta-item { display: flex; flex-direction: column; gap: 4px; }
.meta-label { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
.meta-value { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--text); }

/* map */
#mapwrap {
  position: relative;
  overflow: hidden;
  background: #0a0e12;
  touch-action: none;
  cursor: grab;
}
#mapwrap:active { cursor: grabbing; }
#tile-layer { position: absolute; top: 0; left: 0; will-change: transform; filter: invert(1) hue-rotate(180deg) saturate(0.7) brightness(0.85); }
.tile-img { position: absolute; width: 256px; height: 256px; display: block; }

#pin { position: absolute; pointer-events: none; z-index: 10; }
.pin-ring {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 60px; height: 60px; border-radius: 50%;
  border: 1px solid rgba(0,212,255,.3);
  animation: ring-ping 2.5s cubic-bezier(0,0,.2,1) infinite;
}
@keyframes ring-ping { 0%{transform:translate(-50%,-50%) scale(.3);opacity:1} 100%{transform:translate(-50%,-50%) scale(2);opacity:0} }
.pin-dot {
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--accent);
  border: 2px solid var(--bg);
  box-shadow: 0 0 16px rgba(0,212,255,.6), 0 0 4px rgba(0,212,255,1);
  position: relative; z-index: 1;
}
.pin-crosshair {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  pointer-events: none;
}
.pin-crosshair::before, .pin-crosshair::after {
  content: '';
  position: absolute;
  background: rgba(0,212,255,.25);
}
.pin-crosshair::before { width: 1px; height: 40px; top: -20px; left: 0; }
.pin-crosshair::after { width: 40px; height: 1px; top: 0; left: -20px; }

/* zoom controls */
#zoom-btns {
  position: absolute; right: 20px; bottom: 20px; z-index: 20;
  display: flex; flex-direction: column; gap: 2px;
}
.zoom-btn {
  width: 32px; height: 32px;
  background: var(--surface);
  border: 1px solid var(--border2);
  color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; font-weight: 300;
  transition: all .15s;
  font-family: var(--mono);
}
.zoom-btn:hover { background: var(--surface2); color: var(--accent); border-color: var(--accent); }
.zoom-btn:first-child { border-radius: 4px 4px 0 0; }
.zoom-btn:last-child { border-radius: 0 0 4px 4px; }

#attribution {
  position: absolute; bottom: 6px; left: 10px;
  font-family: var(--mono); font-size: 9px;
  color: rgba(255,255,255,.2);
  z-index: 20; pointer-events: none;
}

/* bottom stats */
.stats-bar {
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 0;
}
.stat {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 12px 0;
  border-right: 1px solid var(--border);
  gap: 4px;
}
.stat:last-child { border-right: none; }
.stat-val { font-family: var(--mono); font-size: 15px; font-weight: 500; color: var(--text); }
.stat-lbl { font-family: var(--mono); font-size: 9px; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; }

/* empty state */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--dim);
}
.empty-icon { font-size: 32px; opacity: .4; }
.empty-text { font-family: var(--mono); font-size: 12px; letter-spacing: 1px; color: var(--muted); }
</style>
</head>
<body>
<div class="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-logo">TrackR</div>
    <div class="topbar-divider"></div>
    <div class="topbar-meta">GPS MONITOR v2.4.1</div>
    <div class="topbar-right">
      <div class="device-id">4F2A8C1D</div>
      <div class="status-pill"><div class="pulse"></div>ACTIEF</div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-label">Locatiehistorie</div>
      <div class="sidebar-title">Laatste 7 dagen</div>
    </div>
    <div class="log-list" id="log-list"></div>
  </div>

  <!-- MAIN -->
  <div class="main" id="main">

    <div class="coord-header" id="coord-header" style="display:none">
      <div class="coord-block">
        <div class="coord-label">Coördinaten</div>
        <div class="coord-value" id="d-coords">—</div>
      </div>
      <div class="coord-divider"></div>
      <div class="meta-block">
        <div class="meta-item"><span class="meta-label">Datum</span><span class="meta-value" id="d-date">—</span></div>
        <div class="meta-item"><span class="meta-label">Tijdstip</span><span class="meta-value" id="d-time">—</span></div>
        <div class="meta-item"><span class="meta-label">Nauwkeurigheid</span><span class="meta-value" id="d-acc">—</span></div>
        <div class="meta-item"><span class="meta-label">Type</span><span class="meta-value" id="d-label">—</span></div>
      </div>
    </div>

    <div id="mapwrap" style="display:none; position:relative; overflow:hidden;">
      <div id="tile-layer"></div>
      <div id="pin"><div class="pin-ring"></div><div class="pin-crosshair"></div><div class="pin-dot"></div></div>
      <div id="zoom-btns">
        <div class="zoom-btn" onclick="zoomStep(1)">+</div>
        <div class="zoom-btn" onclick="zoomStep(-1)">−</div>
      </div>
      <div id="attribution">© OpenStreetMap contributors</div>
    </div>

    <div class="stats-bar" id="stats-bar" style="display:none">
      <div class="stat"><span class="stat-val" id="d-speed">—</span><span class="stat-lbl">Snelheid</span></div>
      <div class="stat"><span class="stat-val" id="d-bat">—</span><span class="stat-lbl">Batterij</span></div>
      <div class="stat"><span class="stat-val" id="d-sig">—</span><span class="stat-lbl">Signaal</span></div>
      <div class="stat"><span class="stat-val" id="d-dur">—</span><span class="stat-lbl">Verblijfsduur</span></div>
    </div>

    <div class="empty-state" id="empty-state">
      <div class="empty-icon">⊹</div>
      <div class="empty-text">SELECTEER EEN LOCATIE</div>
    </div>

  </div>
</div>

<script>
const entries = [
  { id:0, lat:52.6368, lon:6.7933, date:"ma 26 mei", time:"23:14", duration:"8u 42m", acc:"±4m", speed:"0 km/u", bat:"73%", sig:"4G", type:"night", label:"Nacht", icon:"🌙" },
  { id:1, lat:52.5159, lon:6.1014, date:"di 27 mei", time:"09:07", duration:"1u 18m", acc:"±6m", speed:"0 km/u", bat:"71%", sig:"4G", type:"stop",  label:"Stop",  icon:"⬛" },
  { id:2, lat:52.2661, lon:6.7979, date:"di 27 mei", time:"14:52", duration:"0u 34m", acc:"±5m", speed:"0 km/u", bat:"68%", sig:"4G", type:"move",  label:"Rijden", icon:"→" },
  { id:3, lat:52.4588, lon:6.5217, date:"di 27 mei", time:"22:38", duration:"9u 05m", acc:"±4m", speed:"0 km/u", bat:"62%", sig:"3G", type:"night", label:"Nacht", icon:"🌙" },
  { id:4, lat:52.3163, lon:6.6370, date:"wo 28 mei", time:"11:22", duration:"2u 11m", acc:"±8m", speed:"0 km/u", bat:"58%", sig:"4G", type:"stop",  label:"Stop",  icon:"⬛" },
  { id:5, lat:52.5871, lon:6.6187, date:"wo 28 mei", time:"16:03", duration:"0u 28m", acc:"±5m", speed:"0 km/u", bat:"55%", sig:"4G", type:"move",  label:"Rijden", icon:"→" },
  { id:6, lat:52.3848, lon:6.9127, date:"do 29 mei", time:"00:17", duration:"7u 53m", acc:"±4m", speed:"0 km/u", bat:"48%", sig:"4G", type:"night", label:"Nacht", icon:"🌙" },
];

// Build list
const list = document.getElementById('log-list');
entries.forEach(e => {
  const item = document.createElement('div');
  item.className = 'log-item';
  item.id = `item-${e.id}`;
  item.innerHTML = `
    <div class="log-icon ${e.type}">${e.icon}</div>
    <div class="log-info">
      <div class="log-coords">${e.lat.toFixed(4)}°N  ${e.lon.toFixed(4)}°E</div>
      <div class="log-meta">${e.date} · ${e.time}</div>
    </div>
    <span class="log-dur">${e.duration}</span>`;
  item.onclick = () => openEntry(e.id);
  list.appendChild(item);
});

// Map state
let zoom = 14, viewX, viewY, pinLat, pinLon, currentId = null;

function latToY(lat, z) {
  return (1 - Math.log(Math.tan(lat*Math.PI/180) + 1/Math.cos(lat*Math.PI/180))/Math.PI) / 2 * Math.pow(2,z);
}
function lonToX(lon, z) { return (lon+180)/360*Math.pow(2,z); }
function yToLat(y, z) {
  const n = Math.PI - 2*Math.PI*y/Math.pow(2,z);
  return 180/Math.PI*Math.atan(.5*(Math.exp(n)-Math.exp(-n)));
}

function render() {
  const wrap = document.getElementById('mapwrap');
  const layer = document.getElementById('tile-layer');
  const W = wrap.clientWidth, H = wrap.clientHeight;
  const originX = W/2 - viewX*256, originY = H/2 - viewY*256;
  layer.style.transform = `translate(${originX}px,${originY}px)`;

  const pin = document.getElementById('pin');
  pin.style.left = (lonToX(pinLon,zoom)*256 - 6) + 'px';
  pin.style.top  = (latToY(pinLat,zoom)*256 - 6) + 'px';

  const minTX = Math.floor(-originX/256)-1, maxTX = Math.ceil((W-originX)/256);
  const minTY = Math.floor(-originY/256)-1, maxTY = Math.ceil((H-originY)/256);
  const needed = new Set();
  for (let tx=minTX;tx<=maxTX;tx++) for (let ty=minTY;ty<=maxTY;ty++) needed.add(`${zoom}/${tx}/${ty}`);
  Array.from(layer.querySelectorAll('.tile-img')).forEach(img => { if (!needed.has(img.dataset.key)) img.remove(); });
  const existing = new Set(Array.from(layer.querySelectorAll('.tile-img')).map(i=>i.dataset.key));
  const maxT = Math.pow(2,zoom); const svrs=['a','b','c']; let si=0;
  for (let tx=minTX;tx<=maxTX;tx++) {
    for (let ty=minTY;ty<=maxTY;ty++) {
      if (ty<0||ty>=maxT) continue;
      const key=`${zoom}/${tx}/${ty}`;
      if (existing.has(key)) continue;
      const wtx=((tx%maxT)+maxT)%maxT;
      const img=document.createElement('img');
      img.className='tile-img'; img.dataset.key=key;
      img.style.left=(tx*256)+'px'; img.style.top=(ty*256)+'px';
      img.src=`https://${svrs[si++%3]}.tile.openstreetmap.org/${zoom}/${wtx}/${ty}.png`;
      layer.appendChild(img);
    }
  }
}

// Pan
let dragging=false, lastX, lastY, pinchD=null;
const mw = document.getElementById('mapwrap');
mw.addEventListener('mousedown', e=>{dragging=true;lastX=e.clientX;lastY=e.clientY;});
window.addEventListener('mousemove', e=>{
  if(!dragging)return;
  const dx=e.clientX-lastX, dy=e.clientY-lastY;
  lastX=e.clientX; lastY=e.clientY;
  viewX-=dx/256; viewY-=dy/256; render();
});
window.addEventListener('mouseup',()=>{dragging=false;});
mw.addEventListener('wheel', e=>{
  e.preventDefault();
  if(e.deltaY<0&&zoom<19){zoom++;rescale();}
  if(e.deltaY>0&&zoom>10){zoom--;rescale();}
},{passive:false});
mw.addEventListener('touchstart',e=>{
  if(e.touches.length===1){dragging=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;pinchD=null;}
  else if(e.touches.length===2){dragging=false;pinchD=pd(e);}
},{passive:true});
mw.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===2&&pinchD!==null){
    const d=pd(e);
    if(d/pinchD>1.35&&zoom<19){zoom++;rescale();pinchD=d;}
    if(d/pinchD<0.75&&zoom>10){zoom--;rescale();pinchD=d;}
    return;
  }
  if(!dragging)return;
  const dx=e.touches[0].clientX-lastX,dy=e.touches[0].clientY-lastY;
  lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;
  viewX-=dx/256;viewY-=dy/256;render();
},{passive:false});
mw.addEventListener('touchend',()=>{dragging=false;});
function pd(e){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;return Math.sqrt(dx*dx+dy*dy);}
function rescale(){viewX=lonToX(pinLon,zoom);viewY=latToY(pinLat,zoom);document.querySelectorAll('.tile-img').forEach(i=>i.remove());render();}
function zoomStep(d){const nz=Math.max(10,Math.min(19,zoom+d));if(nz===zoom)return;zoom=nz;rescale();}

function openEntry(id) {
  const e = entries[id];
  pinLat=e.lat; pinLon=e.lon; zoom=14;
  viewX=lonToX(e.lon,zoom); viewY=latToY(e.lat,zoom);

  document.getElementById('d-coords').textContent = `${e.lat.toFixed(4)}°N  ${e.lon.toFixed(4)}°E`;
  document.getElementById('d-date').textContent   = e.date;
  document.getElementById('d-time').textContent   = e.time;
  document.getElementById('d-acc').textContent    = e.acc;
  document.getElementById('d-label').textContent  = e.label;
  document.getElementById('d-speed').textContent  = e.speed;
  document.getElementById('d-bat').textContent    = e.bat;
  document.getElementById('d-sig').textContent    = e.sig;
  document.getElementById('d-dur').textContent    = e.duration;

  // Active state in list
  document.querySelectorAll('.log-item').forEach(i=>i.classList.remove('active'));
  document.getElementById(`item-${id}`).classList.add('active');

  // Show panels
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('coord-header').style.display = 'flex';
  document.getElementById('mapwrap').style.display = 'block';
  document.getElementById('stats-bar').style.display = 'flex';

  // Fix grid
  document.getElementById('main').style.gridTemplateRows = 'auto 1fr auto';

  document.querySelectorAll('.tile-img').forEach(i=>i.remove());
  requestAnimationFrame(render);
  currentId = id;
}

window.addEventListener('resize', ()=>{ if(currentId!==null) render(); });
</script>
</body>
</html>
