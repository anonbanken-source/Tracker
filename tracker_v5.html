<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TrackR</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f5f7; --surface: #fff; --border: #e0e0e0;
  --text: #1a1a1a; --muted: #6e6e73; --dim: #aeaeb2;
  --accent: #1d62f0; --accent-bg: #e8effe; --green: #34c759;
  --font: -apple-system,'SF Pro Text','Helvetica Neue',sans-serif;
  --mono: 'SF Mono','Courier New',monospace;
}
html,body { height:100%; font-family:var(--font); background:var(--bg); color:var(--text); overflow:hidden; -webkit-font-smoothing:antialiased; }
.screen { position:fixed; inset:0; display:flex; flex-direction:column; background:var(--bg); transition:transform .3s cubic-bezier(.4,0,.2,1),opacity .3s; }
.screen.hidden { transform:translateX(100%); opacity:0; pointer-events:none; }
.statusbar { height:44px; background:rgba(249,249,251,.95); flex-shrink:0; }
.navbar { background:rgba(249,249,251,.95); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-bottom:1px solid var(--border); padding:0 16px 12px; display:flex; align-items:center; gap:12px; min-height:44px; flex-shrink:0; }
.nav-title { font-size:17px; font-weight:600; letter-spacing:-.3px; flex:1; text-align:center; }
.nav-back { display:flex; align-items:center; gap:3px; color:var(--accent); font-size:17px; background:none; border:none; padding:0; cursor:pointer; min-width:60px; }
.nav-back svg { width:10px; height:17px; }
.nav-side { min-width:60px; }
.devbar { background:var(--surface); border-bottom:1px solid var(--border); padding:14px 16px; flex-shrink:0; }
.devlabel { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px; }
.devrow { display:flex; align-items:center; justify-content:space-between; }
.devid { font-family:var(--mono); font-size:14px; font-weight:600; }
.badge { display:flex; align-items:center; gap:6px; background:#e8fdf0; border:1px solid #b8eecb; border-radius:20px; padding:5px 10px; font-size:12px; font-weight:600; color:#1a7a3a; }
.dot { width:7px; height:7px; border-radius:50%; background:var(--green); animation:blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }
.sec-header { padding:18px 16px 6px; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; font-weight:500; }
.log-scroll { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding-bottom:32px; }
.log-scroll::-webkit-scrollbar { display:none; }
.log-group { margin:0 16px 20px; }
.log-row { background:var(--surface); display:flex; align-items:center; gap:12px; padding:13px 14px; border-bottom:1px solid var(--border); cursor:pointer; -webkit-tap-highlight-color:rgba(0,0,0,.04); transition:background .1s; }
.log-row:active { background:#f0f0f2; }
.log-row:first-child { border-radius:12px 12px 0 0; }
.log-row:last-child { border-radius:0 0 12px 12px; border-bottom:none; }
.log-row:only-child { border-radius:12px; border-bottom:none; }
.icon-wrap { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.icon-wrap.night { background:#f0eeff; color:#5e35b1; }
.icon-wrap.stop  { background:var(--accent-bg); color:var(--accent); }
.icon-wrap.move  { background:#fff3e0; color:#e65100; }
.icon-wrap svg { width:17px; height:17px; }
.row-info { flex:1; min-width:0; }
.row-coords { font-family:var(--mono); font-size:13.5px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.row-meta { font-size:12px; color:var(--muted); margin-top:2px; }
.row-dur { font-size:12px; color:var(--dim); font-family:var(--mono); flex-shrink:0; }
.chev { color:var(--dim); flex-shrink:0; }
.chev svg { width:7px; height:12px; }
.coordbar { background:var(--surface); border-bottom:1px solid var(--border); padding:14px 16px 16px; flex-shrink:0; }
.coordlabel { font-size:11px; text-transform:uppercase; letter-spacing:.7px; color:var(--muted); margin-bottom:6px; font-weight:500; }
.coordval { font-family:var(--mono); font-size:20px; font-weight:600; letter-spacing:.4px; }
.coordsub { display:flex; gap:20px; margin-top:10px; }
.csub { display:flex; flex-direction:column; gap:2px; }
.csubl { font-size:10px; text-transform:uppercase; letter-spacing:.6px; color:var(--dim); }
.csubv { font-family:var(--mono); font-size:13px; font-weight:500; color:var(--muted); }

#mapwrap { flex:1; position:relative; overflow:hidden; background:#e8eedc; min-height:0; touch-action:none; cursor:grab; }
#mapwrap:active { cursor:grabbing; }
#tile-layer { position:absolute; top:0; left:0; will-change:transform; }
.tile-img { position:absolute; width:256px; height:256px; display:block; }

/* Pin lives inside tile-layer so it moves with the map */
#pin { position:absolute; pointer-events:none; z-index:10; }
.pin-pulse { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:52px; height:52px; border-radius:50%; background:rgba(29,98,240,.18); animation:ping 2s cubic-bezier(0,0,.2,1) infinite; }
@keyframes ping { 0%{transform:translate(-50%,-50%) scale(.3);opacity:1} 100%{transform:translate(-50%,-50%) scale(2.2);opacity:0} }
.pin-dot { width:18px; height:18px; border-radius:50%; background:var(--accent); border:3px solid #fff; box-shadow:0 2px 10px rgba(0,0,0,.3); position:relative; z-index:1; }

#attribution { position:absolute; bottom:4px; right:6px; font-size:9px; color:rgba(0,0,0,.45); background:rgba(255,255,255,.7); padding:1px 4px; border-radius:3px; z-index:20; pointer-events:none; }

#zoom-btns { position:absolute; right:12px; top:50%; transform:translateY(-50%); z-index:20; display:flex; flex-direction:column; gap:1px; }
.zoom-btn { width:36px; height:36px; background:rgba(255,255,255,.92); border:1px solid rgba(0,0,0,.15); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:20px; font-weight:300; color:#333; -webkit-tap-highlight-color:transparent; user-select:none; }
.zoom-btn:active { background:#f0f0f2; }
.zoom-btn:first-child { border-radius:8px 8px 0 0; }
.zoom-btn:last-child  { border-radius:0 0 8px 8px; }

.infobar { background:var(--surface); border-top:1px solid var(--border); display:flex; flex-shrink:0; }
.iitem { flex:1; display:flex; flex-direction:column; align-items:center; padding:12px 0; gap:3px; }
.iitem+.iitem { border-left:1px solid var(--border); }
.ival { font-size:15px; font-weight:600; font-family:var(--mono); }
.ilbl { font-size:10px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); }
</style>
</head>
<body>

<div class="screen" id="s-list">
  <div class="statusbar"></div>
  <div class="navbar">
    <span class="nav-side"></span>
    <span class="nav-title">Locatiehistorie</span>
    <span class="nav-side" style="text-align:right;font-size:13px;color:var(--muted);font-family:var(--mono)">TRK-07</span>
  </div>
  <div class="devbar">
    <div class="devlabel">Apparaat</div>
    <div class="devrow">
      <div class="devid">GPS-TRK · 4F2A8C1D</div>
      <div class="badge"><div class="dot"></div>Actief</div>
    </div>
  </div>
  <div class="log-scroll">
    <div class="sec-header">Laatste 7 dagen</div>
    <div class="log-group" id="log-group"></div>
  </div>
</div>

<div class="screen hidden" id="s-detail">
  <div class="statusbar"></div>
  <div class="navbar">
    <button class="nav-back" onclick="goBack()">
      <svg viewBox="0 0 10 17" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9,1 1,8.5 9,16"/></svg>
      Terug
    </button>
    <span class="nav-title" id="d-title">Locatie</span>
    <span class="nav-side"></span>
  </div>
  <div class="coordbar">
    <div class="coordlabel">Coördinaten</div>
    <div class="coordval" id="d-coords">—</div>
    <div class="coordsub">
      <div class="csub"><span class="csubl">Datum</span><span class="csubv" id="d-date">—</span></div>
      <div class="csub"><span class="csubl">Tijdstip</span><span class="csubv" id="d-time">—</span></div>
      <div class="csub"><span class="csubl">Nauwkeurigheid</span><span class="csubv" id="d-acc">—</span></div>
    </div>
  </div>
  <div id="mapwrap">
    <div id="tile-layer">
      <div id="pin"><div class="pin-pulse"></div><div class="pin-dot"></div></div>
    </div>
    <div id="zoom-btns">
      <div class="zoom-btn" ontouchstart="zoomStep(1)" onclick="zoomStep(1)">+</div>
      <div class="zoom-btn" ontouchstart="zoomStep(-1)" onclick="zoomStep(-1)">−</div>
    </div>
    <div id="attribution">© OpenStreetMap</div>
  </div>
  <div class="infobar">
    <div class="iitem"><span class="ival" id="d-speed">—</span><span class="ilbl">Snelheid</span></div>
    <div class="iitem"><span class="ival" id="d-bat">—</span><span class="ilbl">Batterij</span></div>
    <div class="iitem"><span class="ival" id="d-sig">—</span><span class="ilbl">Signaal</span></div>
  </div>
</div>

<script>
const entries = [
  { id:0, lat:52.6368, lon:6.7933, date:"ma 26 mei", time:"23:14", duration:"8u 42m", acc:"±4m", speed:"0 km/u", bat:"73%", sig:"4G", type:"night", label:"Nacht" },
  { id:1, lat:52.5159, lon:6.1014, date:"di 27 mei", time:"09:07", duration:"1u 18m", acc:"±6m", speed:"0 km/u", bat:"71%", sig:"4G", type:"stop",  label:"Stop"  },
  { id:2, lat:52.2661, lon:6.7979, date:"di 27 mei", time:"14:52", duration:"0u 34m", acc:"±5m", speed:"0 km/u", bat:"68%", sig:"4G", type:"move",  label:"Rijden" },
  { id:3, lat:52.4588, lon:6.5217, date:"di 27 mei", time:"22:38", duration:"9u 05m", acc:"±4m", speed:"0 km/u", bat:"62%", sig:"3G", type:"night", label:"Nacht" },
  { id:4, lat:52.3163, lon:6.6370, date:"wo 28 mei", time:"11:22", duration:"2u 11m", acc:"±8m", speed:"0 km/u", bat:"58%", sig:"4G", type:"stop",  label:"Stop"  },
  { id:5, lat:52.5871, lon:6.6187, date:"wo 28 mei", time:"16:03", duration:"0u 28m", acc:"±5m", speed:"0 km/u", bat:"55%", sig:"4G", type:"move",  label:"Rijden" },
  { id:6, lat:52.3848, lon:6.9127, date:"do 29 mei", time:"00:17", duration:"7u 53m", acc:"±4m", speed:"0 km/u", bat:"48%", sig:"4G", type:"night", label:"Nacht" },
];

const ICONS = {
  night:`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`,
  stop: `<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="9"/><rect x="8.5" y="8.5" width="7" height="7" fill="white" rx="1"/></svg>`,
  move: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="13 6 19 12 13 18"/></svg>`
};
const CHEV = `<svg viewBox="0 0 7 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,1 6,6 1,11"/></svg>`;

const grp = document.getElementById('log-group');
entries.forEach(e => {
  const div = document.createElement('div');
  div.className = 'log-row';
  div.innerHTML = `
    <div class="icon-wrap ${e.type}">${ICONS[e.type]}</div>
    <div class="row-info">
      <div class="row-coords">${e.lat.toFixed(4)}° N,  ${e.lon.toFixed(4)}° E</div>
      <div class="row-meta">${e.date} · ${e.time}</div>
    </div>
    <span class="row-dur">${e.duration}</span>
    <span class="chev">${CHEV}</span>`;
  div.onclick = () => openDetail(e.id);
  grp.appendChild(div);
});

// ── Map state ──
// viewX/viewY = tile-pixel coords of the screen center
let zoom = 15;
let viewX, viewY;   // fractional tile coords × 256 = pixel in tile space
let pinLat, pinLon; // the geo coord the pin is locked to

function latToY(lat, z) {
  return (1 - Math.log(Math.tan(lat * Math.PI/180) + 1/Math.cos(lat * Math.PI/180)) / Math.PI) / 2 * Math.pow(2, z);
}
function lonToX(lon, z) { return (lon + 180) / 360 * Math.pow(2, z); }
function yToLat(y, z) {
  const n = Math.PI - 2 * Math.PI * y / Math.pow(2, z);
  return 180 / Math.PI * Math.atan(0.5*(Math.exp(n)-Math.exp(-n)));
}

function render() {
  const wrap = document.getElementById('mapwrap');
  const layer = document.getElementById('tile-layer');
  const W = wrap.clientWidth, H = wrap.clientHeight;

  // Tile-layer origin: tile (0,0) pixel corner relative to screen
  // screen center = (W/2, H/2) maps to tile-pixel (viewX*256, viewY*256)
  const originX = W/2 - viewX * 256;
  const originY = H/2 - viewY * 256;
  layer.style.transform = `translate(${originX}px, ${originY}px)`;

  // Position pin at its geo coordinate
  const pin = document.getElementById('pin');
  const pinTX = lonToX(pinLon, zoom);
  const pinTY = latToY(pinLat, zoom);
  pin.style.left = (pinTX * 256 - 9) + 'px';   // -9 = half of 18px dot
  pin.style.top  = (pinTY * 256 - 9) + 'px';

  // Which tiles are visible?
  const minTX = Math.floor((-originX) / 256) - 1;
  const maxTX = Math.ceil((W - originX) / 256);
  const minTY = Math.floor((-originY) / 256) - 1;
  const maxTY = Math.ceil((H - originY) / 256);

  const needed = new Set();
  for (let tx = minTX; tx <= maxTX; tx++)
    for (let ty = minTY; ty <= maxTY; ty++)
      needed.add(`${zoom}/${tx}/${ty}`);

  // Remove stale
  Array.from(layer.querySelectorAll('.tile-img')).forEach(img => {
    if (!needed.has(img.dataset.key)) img.remove();
  });

  // Add missing
  const existing = new Set(Array.from(layer.querySelectorAll('.tile-img')).map(i => i.dataset.key));
  const maxT = Math.pow(2, zoom);
  const svrs = ['a','b','c']; let si = 0;

  for (let tx = minTX; tx <= maxTX; tx++) {
    for (let ty = minTY; ty <= maxTY; ty++) {
      if (ty < 0 || ty >= maxT) continue;
      const key = `${zoom}/${tx}/${ty}`;
      if (existing.has(key)) continue;
      const wtx = ((tx % maxT) + maxT) % maxT;
      const img = document.createElement('img');
      img.className = 'tile-img';
      img.dataset.key = key;
      img.style.left = (tx * 256) + 'px';
      img.style.top  = (ty * 256) + 'px';
      img.src = `https://${svrs[si++%3]}.tile.openstreetmap.org/${zoom}/${wtx}/${ty}.png`;
      layer.appendChild(img);
    }
  }
}

// ── Touch / mouse pan ──
let dragging = false, lastX, lastY, pinchDist0 = null;

const mw = document.getElementById('mapwrap');

mw.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    dragging = true; pinchDist0 = null;
    lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    dragging = false;
    pinchDist0 = pinchDist(e);
  }
}, {passive:true});

mw.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 2 && pinchDist0 !== null) {
    const d = pinchDist(e);
    if (d / pinchDist0 > 1.35 && zoom < 19) { zoom++; rescaleView(); pinchDist0 = d; }
    if (d / pinchDist0 < 0.75 && zoom > 10) { zoom--; rescaleView(); pinchDist0 = d; }
    return;
  }
  if (!dragging) return;
  const dx = e.touches[0].clientX - lastX;
  const dy = e.touches[0].clientY - lastY;
  lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
  doPan(dx, dy);
}, {passive:false});

mw.addEventListener('touchend', () => { dragging = false; });
mw.addEventListener('mousedown', e => { dragging=true; lastX=e.clientX; lastY=e.clientY; });
window.addEventListener('mousemove', e => { if(!dragging)return; doPan(e.clientX-lastX,e.clientY-lastY); lastX=e.clientX; lastY=e.clientY; });
window.addEventListener('mouseup', () => { dragging=false; });

function pinchDist(e) {
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  return Math.sqrt(dx*dx+dy*dy);
}

function doPan(dx, dy) {
  // shift view center in tile-pixel space
  viewX -= dx / 256;
  viewY -= dy / 256;
  render();
}

function rescaleView() {
  // viewX/viewY are in tile units — adjust for new zoom
  // tile units double when zoom increases
  // We keep the same geo center, just recompute viewX/Y at new zoom
  viewX = lonToX(pinLon, zoom); // re-center on pin after zoom
  viewY = latToY(pinLat, zoom);
  // Clear tiles so wrong-zoom tiles don't linger
  document.querySelectorAll('.tile-img').forEach(i => i.remove());
  render();
}

function zoomStep(delta) {
  const newZ = Math.max(10, Math.min(19, zoom + delta));
  if (newZ === zoom) return;
  zoom = newZ;
  rescaleView();
}

function openDetail(id) {
  const e = entries[id];
  pinLat = e.lat; pinLon = e.lon; zoom = 15;
  viewX = lonToX(e.lon, zoom);
  viewY = latToY(e.lat, zoom);

  document.getElementById('d-title').textContent  = e.label;
  document.getElementById('d-coords').textContent = `${e.lat.toFixed(4)}°N  ${e.lon.toFixed(4)}°E`;
  document.getElementById('d-date').textContent   = e.date;
  document.getElementById('d-time').textContent   = e.time;
  document.getElementById('d-acc').textContent    = e.acc;
  document.getElementById('d-speed').textContent  = e.speed;
  document.getElementById('d-bat').textContent    = e.bat;
  document.getElementById('d-sig').textContent    = e.sig;

  document.querySelectorAll('.tile-img').forEach(i => i.remove());
  document.getElementById('s-list').classList.add('hidden');
  document.getElementById('s-detail').classList.remove('hidden');
  requestAnimationFrame(render);
}

function goBack() {
  document.getElementById('s-detail').classList.add('hidden');
  document.getElementById('s-list').classList.remove('hidden');
}
</script>
</body>
</html>
